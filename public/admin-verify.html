<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Manual Verification</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #0f766e;
            --danger: #dc2626;
            --success: #16a34a;
            --border: #dbe3ef;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Segoe UI, Arial, sans-serif;
            background: radial-gradient(circle at top left, #e8f7f5 0%, var(--bg) 45%);
            color: var(--text);
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(15, 118, 110, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p.help {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            font-size: 13px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 14px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .msg {
            margin-top: 14px;
            border-radius: 10px;
            padding: 12px;
            font-size: 13px;
            display: none;
        }

        .msg.error {
            display: block;
            color: var(--danger);
            border: 1px solid #fecaca;
            background: #fef2f2;
        }

        .msg.success {
            display: block;
            color: var(--success);
            border: 1px solid #bbf7d0;
            background: #f0fdf4;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Manual User Verification</h1>
    <p class="help">Use this only for support cases when mail delivery fails. Set ADMIN_VERIFY_KEY on the server first.</p>

    <label for="email">User Email</label>
    <input id="email" type="email" placeholder="user@example.com" autocomplete="email">

    <label for="adminKey">Admin Verify Key</label>
    <input id="adminKey" type="password" placeholder="ADMIN_VERIFY_KEY" autocomplete="off">

    <button id="verifyBtn" onclick="manualVerify()">Verify User</button>

    <div id="msg" class="msg"></div>
</div>

<script>
    async function manualVerify() {
        const email = document.getElementById('email').value.trim();
        const adminKey = document.getElementById('adminKey').value.trim();
        const btn = document.getElementById('verifyBtn');
        const msg = document.getElementById('msg');

        msg.className = 'msg';

        if (!email || !adminKey) {
            msg.textContent = 'Email and admin key are required.';
            msg.className = 'msg error';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Verifying...';

        try {
            const res = await fetch('api.php/auth/admin-verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, adminKey })
            });

            const data = await res.json();

            if (data.success) {
                msg.textContent = data.message || 'User verified successfully.';
                msg.className = 'msg success';
            } else {
                msg.textContent = data.message || 'Verification failed.';
                msg.className = 'msg error';
            }
        } catch (error) {
            msg.textContent = 'Connection error while calling admin verify endpoint.';
            msg.className = 'msg error';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Verify User';
        }
    }
</script>
</body>
</html>
