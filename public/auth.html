<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker — Sign In</title>
    <meta name="description" content="Sign in or create an account to track your expenses.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --bg: #f5f5f7;
            --surface: #ffffff;
            --border: #e5e7eb;
            --danger: #ef4444;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-full: 9999px;
            --shadow-md: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
            --transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -200px; left: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(79,70,229,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px; right: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(129,140,248,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* Brand header */
        .brand-header {
            padding: 32px 32px 0;
            text-align: center;
        }

        .brand-icon {
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 14px;
            box-shadow: 0 4px 12px rgba(79,70,229,0.35);
        }

        .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.4px;
        }

        /* Tab switcher */
        .tab-switcher {
            display: flex;
            margin: 24px 24px 0;
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 4px;
            gap: 4px;
        }

        .tab-switch-btn {
            flex: 1;
            padding: 9px;
            border: none;
            border-radius: 7px;
            font-size: 13.5px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            color: var(--text-secondary);
            background: transparent;
            transition: var(--transition);
        }

        .tab-switch-btn.active {
            background: var(--surface);
            color: var(--accent);
            font-weight: 600;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        /* Form area */
        .form-area {
            padding: 24px 32px 32px;
        }

        .form-panel { display: none; }
        .form-panel.active {
            display: block;
            animation: fadeUp 0.2s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-heading {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        .form-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 22px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            pointer-events: none;
            opacity: 0.5;
        }

        input {
            width: 100%;
            padding: 11px 14px 11px 38px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg);
            transition: var(--transition);
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
        }

        input::placeholder { color: var(--text-muted); }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            box-shadow: 0 2px 8px rgba(79,70,229,0.3);
            letter-spacing: -0.1px;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(79,70,229,0.4);
        }

        .btn-submit:active { transform: translateY(0); }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error / success messages */
        .msg {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 14px;
            display: none;
        }
        .msg.error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; display: block; }
        .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }

        /* Divider */
        .divider {
            text-align: center;
            position: relative;
            margin: 16px 0;
            color: var(--text-muted);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 24px);
            height: 1px;
            background: var(--border);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* Demo login hint */
        .demo-hint {
            background: var(--accent-light);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 12px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 14px;
            font-weight: 500;
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            padding: 16px 32px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @media (max-width: 480px) {
            .auth-card { border-radius: var(--radius-sm); }
            .brand-header { padding: 24px 20px 0; }
            .form-area { padding: 20px 20px 24px; }
            .auth-footer { padding: 14px 20px; }
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand-header">
        <div class="brand-icon">💰</div>
        <div class="brand-name">Expense Tracker</div>
    </div>

    <!-- Tab switcher -->
    <div class="tab-switcher">
        <button id="btn-show-login" class="tab-switch-btn active" onclick="showTab('login')">Sign In</button>
        <button id="btn-show-register" class="tab-switch-btn" onclick="showTab('register')">Create Account</button>
    </div>

    <div class="form-area">

        <!-- ── Login Panel ── -->
        <div id="panel-login" class="form-panel active">
            <p class="form-heading">Welcome back</p>
            <p class="form-sub">Sign in to your account to continue</p>

            <div id="demo-hint" class="demo-hint">
                Demo: demo@example.com / password123
            </div>

            <div id="login-msg" class="msg"></div>
            <button id="resend-verification-btn" class="btn-submit" style="display:none; margin-bottom: 12px;" onclick="resendVerification()">Resend Activation Email</button>

            <div class="form-group">
                <label for="login-email">Email</label>
                <div class="input-wrap">
                    <span class="input-icon">✉️</span>
                    <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password">
                </div>
            </div>

            <button id="login-btn" class="btn-submit" onclick="doLogin()">Sign In</button>
        </div>

        <!-- ── Register Panel ── -->
        <div id="panel-register" class="form-panel">
            <p class="form-heading">Create an account</p>
            <p class="form-sub">Start tracking your expenses today</p>

            <div id="register-msg" class="msg"></div>

            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <div class="input-wrap">
                    <span class="input-icon">👤</span>
                    <input id="reg-name" type="text" placeholder="John Doe" autocomplete="name">
                </div>
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <div class="input-wrap">
                    <span class="input-icon">✉️</span>
                    <input id="reg-email" type="email" placeholder="you@example.com" autocomplete="email">
                </div>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input id="reg-password" type="password" placeholder="Min. 6 characters" autocomplete="new-password">
                </div>
            </div>
            <div class="form-group">
                <label for="reg-confirm">Confirm Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input id="reg-confirm" type="password" placeholder="Repeat password" autocomplete="new-password">
                </div>
            </div>

            <button id="register-btn" class="btn-submit" onclick="doRegister()">Create Account</button>
        </div>

    </div><!-- /form-area -->

    <div class="auth-footer">By signing in, you agree to track smarter 💡</div>
</div>

<script>
    let pendingVerificationEmail = '';

    // ── Auto-redirect if already logged in ──────────────────────────────────
    (async function checkSession() {
        try {
            const res = await fetch('api.php/auth/current');
            const data = await res.json();
            if (data.success) {
                window.location.replace('index.html');
            }
        } catch(e) {}
    })();

    // ── Handle email activation token from mail link ────────────────────────
    (async function handleVerificationFromLink() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('verify_token');
        if (!token) return;

        const msg = document.getElementById('login-msg');
        msg.textContent = 'Verifying your email...';
        msg.className = 'msg success';
        showTab('login');

        try {
            const res = await fetch('api.php/auth/verify?token=' + encodeURIComponent(token));
            const data = await res.json();

            if (data.success) {
                msg.textContent = data.message || 'Email verified. You can now sign in.';
                msg.className = 'msg success';
            } else {
                msg.textContent = data.message || 'Verification link is invalid or expired.';
                msg.className = 'msg error';
            }
        } catch (e) {
            msg.textContent = 'Could not verify email right now. Please try again.';
            msg.className = 'msg error';
        }

        params.delete('verify_token');
        const cleanUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
        window.history.replaceState({}, '', cleanUrl);
    })();

    // ── Tab switching ───────────────────────────────────────────────────────
    function showTab(tab) {
        document.getElementById('panel-login').classList.toggle('active', tab === 'login');
        document.getElementById('panel-register').classList.toggle('active', tab === 'register');
        document.getElementById('btn-show-login').classList.toggle('active', tab === 'login');
        document.getElementById('btn-show-register').classList.toggle('active', tab === 'register');
    }

    // ── Login ───────────────────────────────────────────────────────────────
    async function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('login-btn');
        const msg = document.getElementById('login-msg');
        const resendBtn = document.getElementById('resend-verification-btn');

        msg.className = 'msg';
        resendBtn.style.display = 'none';

        if (!email || !password) {
            msg.textContent = 'Please enter your email and password.';
            msg.className = 'msg error';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Signing in…';

        try {
            const res = await fetch('api.php/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (data.success) {
                msg.textContent = '✅ Signed in! Redirecting…';
                msg.className = 'msg success';
                setTimeout(() => window.location.replace('index.html'), 700);
            } else {
                msg.textContent = data.message || 'Invalid email or password.';
                msg.className = 'msg error';

                if (data.requires_verification) {
                    pendingVerificationEmail = email;
                    resendBtn.style.display = 'block';
                }

                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        } catch(e) {
            msg.textContent = 'Connection error. Please try again.';
            msg.className = 'msg error';
            btn.disabled = false;
            btn.innerHTML = 'Sign In';
        }
    }

    // ── Register ────────────────────────────────────────────────────────────
    async function doRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;
        const btn = document.getElementById('register-btn');
        const msg = document.getElementById('register-msg');

        msg.className = 'msg';

        if (!name || !email || !password) {
            msg.textContent = 'All fields are required.';
            msg.className = 'msg error'; return;
        }
        if (password.length < 6) {
            msg.textContent = 'Password must be at least 6 characters.';
            msg.className = 'msg error'; return;
        }
        if (password !== confirm) {
            msg.textContent = 'Passwords do not match.';
            msg.className = 'msg error'; return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Creating account…';

        try {
            const res = await fetch('api.php/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();

            if (data.success) {
                msg.textContent = data.message || '✅ Account created. Please check your email and activate your account before signing in.';
                msg.className = 'msg success';
                pendingVerificationEmail = email;
                document.getElementById('login-email').value = email;
                document.getElementById('login-password').value = '';
                showTab('login');

                const loginMsg = document.getElementById('login-msg');
                loginMsg.textContent = data.message || 'Account created. Check your email for the activation link.';
                loginMsg.className = 'msg success';

                if (!data.emailSent && data.verificationLink) {
                    loginMsg.textContent = loginMsg.textContent + ' Mail is not configured yet. Use this temporary activation link: ' + data.verificationLink;
                }

                document.getElementById('resend-verification-btn').style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            } else {
                msg.textContent = data.message || 'Registration failed. Email may already exist.';
                msg.className = 'msg error';
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        } catch(e) {
            msg.textContent = 'Connection error. Please try again.';
            msg.className = 'msg error';
            btn.disabled = false;
            btn.innerHTML = 'Create Account';
        }
    }

    async function resendVerification() {
        const msg = document.getElementById('login-msg');
        const resendBtn = document.getElementById('resend-verification-btn');
        const emailInput = document.getElementById('login-email').value.trim();
        const email = pendingVerificationEmail || emailInput;

        if (!email) {
            msg.textContent = 'Enter your email first, then click resend.';
            msg.className = 'msg error';
            return;
        }

        resendBtn.disabled = true;
        resendBtn.innerHTML = '<span class="spinner"></span>Sending activation email...';

        try {
            const res = await fetch('api.php/auth/resend-verification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();

            if (data.success) {
                msg.textContent = data.message || 'Activation email sent. Please check your inbox.';
                msg.className = 'msg success';
            } else {
                msg.textContent = data.message || 'Could not resend activation email.';
                if (data.verificationLink) {
                    msg.textContent = msg.textContent + ' Temporary activation link: ' + data.verificationLink;
                }
                msg.className = 'msg error';
            }
        } catch (e) {
            msg.textContent = 'Connection error while sending activation email.';
            msg.className = 'msg error';
        } finally {
            resendBtn.disabled = false;
            resendBtn.innerHTML = 'Resend Activation Email';
        }
    }

    // ── Enter key support ───────────────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        if (document.getElementById('panel-login').classList.contains('active')) {
            doLogin();
        } else {
            doRegister();
        }
    });
</script>
</body>
</html>
